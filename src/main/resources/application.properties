# App
spring.application.name=xpto-api

# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:xpto_db}
spring.datasource.username=${POSTGRES_USER:xpto}
spring.datasource.password=${POSTGRES_PASSWORD:xpto1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Virtual Threads (Java 25)
spring.threads.virtual.enabled=true

# Server
server.port=8080